<!DOCTYPE html>
<html lang="ro">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pasiunea mea - schiul</title>

<style>

/* RESET */

body {
    user-select: none;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BODY */

body{
    display:flex;
    height:100vh;
    background:#dff6ff;
    overflow:hidden;
}

/* MENIU STÂNGA */

.sidebar{
    width:270px;
    background:linear-gradient(to bottom, #0b3d91, #5dade2);
    padding-top:20px;
    box-shadow:4px 0 15px rgba(0,0,0,0.3);
    z-index:5;

    overflow-y:auto;
    scrollbar-width:none;
}

/* ASCUNDE SCROLLBAR */

.sidebar::-webkit-scrollbar{
    display:none;
}

/* TITLU */

.sidebar h1{
    color:white;
    text-align:center;
    margin-bottom:30px;
    padding:10px;
    font-size:28px;
    text-shadow:0 0 10px black;
}

/* BUTOANE MENIU */

.menu a{
    display:block;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.1);

    margin:12px;
    padding:18px;

    border-radius:12px;
    font-size:22px;

    transition:0.3s;

    border:2px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(3px);
}

/* HOVER BUTOANE */

.menu a:hover{
    background:white;
    color:#0b3d91;

    transform:translateX(8px);

    box-shadow:0 0 15px rgba(255,255,255,0.8);
}

/* PARTEA DREAPTĂ */

.content{
    flex:1;

    background:url("ski.jpg") center center/cover no-repeat;

    position:relative;
    overflow:hidden;
}

/* OVERLAY */

.overlay{
    position:absolute;

    width:100%;
    height:100%;

    background:rgba(255,255,255,0.12);

    z-index:1;
}

/* IFRAME */

iframe{
    position:absolute;

    width:100%;
    height:100%;

    border:none;

    z-index:2;
    background:white;
}

/* ZĂPADĂ */

.snow{
    position:absolute;

    width:100%;
    height:100%;

    top:0;
    left:0;

    z-index:3;

    pointer-events:none;
    overflow:hidden;
}

/* FULGI */

.snowflake{
    position:absolute;

    top:-50px;

    color:white;
    opacity:0.9;

    user-select:none;

    animation:fall linear infinite;

    text-shadow:0 0 10px white;
}

/* ANIMAȚIE */

@keyframes fall{

    0%{
        transform:
        translateY(-50px)
        translateX(0px)
        rotate(0deg);
    }

    50%{
        transform:
        translateY(50vh)
        translateX(20px)
        rotate(180deg);
    }

    100%{
        transform:
        translateY(110vh)
        translateX(-20px)
        rotate(360deg);
    }
}

</style>
</head>

<body>

<!-- MENIU -->

<div class="sidebar">

    <h1>Pasiunea mea - Schiul</h1>

    <div class="menu">

        <a href="acasa.html" target="continut">
            <b>Acasă</b>
        </a>

        <a href="inceputul.html" target="continut">
            <b>Începutul</b>
        </a>

        <a href="locatia.html" target="continut">
            <b>Locația</b>
        </a>

        <a href="echipamente.html" target="continut">
            <b>Echipament</b>
        </a>

        <a href="reguli.html" target="continut">
            <b>Reguli</b>
        </a>

        <a href="despre.html" target="continut">
            <b>Despre mine</b>
        </a>

        <a href="curiozitati.html" target="continut">
            <b>Curiozități</b>
        </a>

        <a href="quiz.html" target="continut">
            <b>Quiz</b>
        </a>

        <a href="feedback.html" target="continut">
            <b>Feedback</b>
        </a>

    </div>

</div>

<!-- CONȚINUT -->

<div class="content">

    <div class="overlay"></div>

    <!-- FULGI -->

    <div class="snow" id="snow"></div>

    <iframe name="continut" src="acasa.html"></iframe>

</div>

<!-- MUZICĂ -->

<audio autoplay loop muted id="muzica">
    <source src="muz.mp4" type="audio/mpeg">
</audio>

<!-- SCRIPT AUDIO -->

<script>

window.addEventListener("click", () => {

    const audio = document.getElementById("muzica");

    audio.muted = false;
    audio.play();

}, {once:true});

</script>

</body>
</html>
